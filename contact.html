<!doctype html> 
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contacto · Portfolio Carlos Mape</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <main class="page">
      <!-- CONTACT -->
      <section class="hero" aria-label="Contacto">
        <h1 class="heading option1">Contacto</h1>
        <button
          class="scroll-indicator"
          type="button"
          aria-label="Desplazar hacia el formulario de contacto"
          data-target="#contacto"
        >
          <span class="scroll-indicator__label">Scroll</span>
          <span class="scroll-indicator__icon"></span>
        </button>
      </section>

      <!-- FORMULARIO -->
      <section id="contacto" class="contact-section">
        <div class="container">
          <div class="contact-content">

            <!-- FORMULARIO STATICFORMS -->
            <form 
              class="contact-form" 
              action="https://api.staticforms.dev/submit" 
              method="POST"
            >
              <!-- API KEY -->
              <input type="hidden" name="apiKey" value="sf_lb8d5m46ddmc0i2f460b7f05">
              <!-- Asunto opcional -->
              <input type="hidden" name="subject" value="Nuevo mensaje desde mi web">
              <!-- Redirección tras enviar -->
              <input type="hidden" name="redirectTo" value="https://carlosmape43art.github.io/portfolio/gracias.html">

              <label>Nombre:</label>
              <input type="text" name="name" placeholder="Tu nombre" required>

              <label>Email:</label>
              <input type="email" name="email" placeholder="Tu correo" required>

              <label>Mensaje:</label>
              <textarea name="message" placeholder="Tu mensaje" rows="6" required></textarea>

              <button type="submit" class="contact-submit-btn">Enviar Mensaje</button>
            </form>

            <!-- INFORMACIÓN DE CONTACTO -->
            <div class="contact-info">
              <h3>Información de Contacto</h3>
              <p><strong>Email:</strong> carlosmape43@gmail.com</p>
              <p><strong>Ubicación:</strong> Madrid, España</p>
            </div>

          </div>
        </div>

        <!-- BOTÓN VOLVER AL INICIO -->
        <div class="back-to-top">
          <a href="index.html" class="back-btn">Volver al inicio</a>
        </div>
      </section>
    </main>

    <!-- CONTROLES Y CURSOR -->
    <div class="color-controls">
      <button class="color-btn active" data-scheme="1">Scheme 1</button>
      <button class="color-btn" data-scheme="2">Scheme 2</button>
      <button class="color-btn" data-scheme="3">Scheme 3</button>
      <button class="color-btn" data-scheme="4">Scheme 4</button>
      <button class="color-btn" data-scheme="5">Scheme 5</button>
    </div>

    <button class="toggle-adjuster-btn" id="toggleAdjusterBtn">Adjust Colors</button>

    <div class="color-adjuster-panel" id="colorAdjusterPanel">
      <div class="color-adjuster-header">
        <h3 class="color-adjuster-title">Color Adjuster</h3>
        <button class="color-adjuster-close" id="closeAdjusterBtn">×</button>
      </div>
    </div>

    <div class="custom-cursor" id="customCursor"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="dynamic.js"></script>
  </body>
</html>

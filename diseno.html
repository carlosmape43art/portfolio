    <!-- Minimal lightbox styles (texto centrado + fondo borroso de la imagen) -->
    <style>
      /* minimal overlay */
      .lightbox {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.55);
        z-index: 9999;
        padding: 20px;
      }
      .lightbox.open { display: flex; }

      .lightbox-inner {
        position: relative;
        width: min(900px, 96vw);
        border-radius: 12px;
        overflow: hidden;

        /* cambiado a flex column para apilar caption, imagen y botón */
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 18px;
      }

      /* blurred background using the clicked image */
      .lightbox-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        filter: blur(18px) saturate(105%);
        transform: scale(1.06);
        opacity: 0.95;
        z-index: 1;
      }

      /* subtle dark layer for contrast */
      .lightbox-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35));
        z-index: 2;
      }

      /* centered caption only (no image shown) */
      .lightbox-caption {
        position: relative;
        z-index: 3;
        color: #fff;
        padding: 20px;
        margin: 0; /* margen controlado abajo */
        border-radius: 10px;
        text-align: center;
        width: 100%;
        max-width: 920px;
        font-size: clamp(15px, 2.2vw, 20px);
        line-height: 1.45;
        background: rgba(0,0,0,0.28);
        backdrop-filter: blur(3px);
        word-wrap: break-word;
        white-space: pre-wrap;
      }

      .lightbox-caption + .lightbox-image { margin-top: 14px; }

      .lightbox-image {
        position: relative;
        z-index: 3;
        max-width: 95%;
        max-height: 70vh;
        border-radius: 8px;
        display: none;
        object-fit: contain;
        box-shadow: 0 24px 48px rgba(0,0,0,0.6);
      }

      /* toggle button now en flujo (debajo del caption / imagen) */
      .lightbox-toggle {
        position: relative;
        z-index: 4;
        display: inline-block;
        margin-top: 14px;
        background: rgba(255,255,255,0.06);
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }

      .lightbox-close {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 5;
        background: rgba(255,255,255,0.06);
        color: #fff;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* when in image-mode: hide caption and bg blur, show the image */
      .lightbox.image-mode .lightbox-bg,
      .lightbox.image-mode .lightbox-overlay,
      .lightbox.image-mode .lightbox-caption {
        display: none !important;
      }

      .lightbox.image-mode .lightbox-image {
        display: block;
      }

      @media (max-width:480px){
        .lightbox-caption { font-size: 14px; padding: 14px; }
        .lightbox-toggle { padding: 6px 10px; font-size: 12px; }
      }
    </style>
  </head>
  <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Descripción del diseño">
    <div class="lightbox-inner" role="document">
      <div class="lightbox-bg" aria-hidden="true"></div>
      <div class="lightbox-overlay" aria-hidden="true"></div>

      <!-- caption (texto) -->
      <div class="lightbox-caption" aria-live="polite"></div>

      <!-- image element (hidden inicialmente, shown cuando el usuario pide ver la imagen) -->
      <img class="lightbox-image" src="" alt="Vista ampliada">

      <!-- toggle: por defecto "Ver imagen" cambia a "Ver texto" en modo imagen -->
      <button class="lightbox-toggle" aria-label="Ver imagen">Ver imagen</button>

      <button class="lightbox-close" aria-label="Cerrar">×</button>
    </div>
  </div>

  <script>
    // Minimal lightbox behaviour — texto centrado y fondo blur; toggle para ver imagen completa
    (function(){
      const lightbox = document.getElementById('lightbox');
      const lightboxBg = lightbox.querySelector('.lightbox-bg');
      const caption = lightbox.querySelector('.lightbox-caption');
      const closeBtn = lightbox.querySelector('.lightbox-close');
      const toggleBtn = lightbox.querySelector('.lightbox-toggle');
      const bigImg = lightbox.querySelector('.lightbox-image');

      const imgs = document.querySelectorAll('.gallery-card img');

      imgs.forEach(img=>{
        img.addEventListener('click', e=>{
          e.preventDefault();
          const src = img.src;
          const text = img.dataset.description || img.alt || 'Descripción no disponible';

          // set content
          lightboxBg.style.backgroundImage = `url('${src}')`;
          bigImg.src = src;
          bigImg.alt = img.alt || '';
          caption.textContent = text;

          // open in "texto" mode by default
          lightbox.classList.remove('image-mode');
          toggleBtn.textContent = 'Ver imagen';
          toggleBtn.setAttribute('aria-label','Ver imagen');

          lightbox.classList.add('open');
          lightbox.setAttribute('aria-hidden','false');

          // prevent background scroll
          document.documentElement.style.overflow = 'hidden';
          document.body.style.overflow = 'hidden';

          // focus close for accessibility
          closeBtn.focus();
        });
      });

      // toggle between text and image-only view
      toggleBtn.addEventListener('click', ()=>{
        const isImageMode = lightbox.classList.toggle('image-mode');
        if (isImageMode) {
          toggleBtn.textContent = 'Ver texto';
          toggleBtn.setAttribute('aria-label','Ver texto');
          // move focus to image for keyboard users
          bigImg.focus && bigImg.focus();
        } else {
          toggleBtn.textContent = 'Ver imagen';
          toggleBtn.setAttribute('aria-label','Ver imagen');
          closeBtn.focus();
        }
      });

      function closeLB(){
        lightbox.classList.remove('open','image-mode');
        lightbox.setAttribute('aria-hidden','true');
        lightboxBg.style.backgroundImage = '';
        caption.textContent = '';
        bigImg.src = '';
        document.documentElement.style.overflow = '';
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeLB);

      lightbox.addEventListener('click', e=>{
        if (e.target === lightbox || e.target.classList.contains('lightbox-overlay')) closeLB();
      });

      document.addEventListener('keydown', e=>{
        if (e.key === 'Escape') closeLB();
      });
    })();
  </script>

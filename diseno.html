<!doctype html>

      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap"

  <div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-img" src="" alt="Imagen ampliada">
  </div>
  
  <body>

            </a>

            <a href="assets/2.jpg" class="work-card gallery-card" target="_blank">

            </a>

            <a href="assets/3.jpg" class="work-card gallery-card" target="_blank">

              </div>

              </div>
              <div class="work-card__body">
                <h3 class="work-card__title">Diseño 4</h3>
              </div>
            </a>

            <a href="assets/5.jpg" class="work-card gallery-card" target="_blank">
              <div class="work-card__media">
                <img src="assets/5.jpg" alt="Diseño 5 de Carlos Mape" />
              </div>
              <div class="work-card__body">

              </div>
            </a>

            <a href="assets/6.jpg" class="work-card gallery-card" target="_blank">
              <div class="work-card__media">
                <img src="assets/6.jpg" alt="Diseño 6 de Carlos Mape" />
              </div>
              <div class="work-card__body">

    <!-- Controles de color ocultos (para que dynamic.js funcione igual) -->
    <div class="color-controls">
      <button class="color-btn active" data-scheme="1">Scheme 1</button>
      <button class="color-btn" data-scheme="2">Scheme 2</button>
      <button class="color-btn" data-scheme="3">Scheme 3</button>
      <button class="color-btn" data-scheme="4">Scheme 4</button>
      <button class="color-btn" data-scheme="5">Scheme 5</button>
    </div>

    <button class="toggle-adjuster-btn" id="toggleAdjusterBtn">Adjust Colors</button>

    <div class="color-adjuster-panel" id="colorAdjusterPanel">
      <div class="color-adjuster-header">
        <h3 class="color-adjuster-title">Color Adjuster</h3>
        <button class="color-adjuster-close" id="closeAdjusterBtn">×</button>
      </div>

      <!-- pickers omitidos por brevedad; se reutilizan estilos aunque estén ocultos -->
    </div>

    <div class="custom-cursor" id="customCursor"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="dynamic.js"></script>
  </body>
  <script>
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.querySelector('.lightbox-img');
    const closeBtn = document.querySelector('.lightbox-close');
  
    // Seleccionamos todas las imágenes de la galería
    const galleryImages = document.querySelectorAll('.gallery-card img');
  
    galleryImages.forEach(img => {
      img.addEventListener('click', e => {
        e.preventDefault(); // Evita abrir en otra pestaña
        lightbox.style.display = 'flex';
        lightboxImg.src = img.src;
        lightboxImg.alt = img.alt;
      });
    });
  
    // Cerrar al hacer click en la X
    closeBtn.addEventListener('click', () => {
      lightbox.style.display = 'none';
      lightboxImg.src = '';
    });
  
    // Cerrar al hacer click fuera de la imagen
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) {
        lightbox.style.display = 'none';
        lightboxImg.src = '';
      }
    });
  
    // Cerrar con la tecla ESC
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        lightbox.style.display = 'none';
        lightboxImg.src = '';
      }
    });
  </script>
</html>

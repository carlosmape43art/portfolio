    <!-- Reemplazo: estilos del lightbox (mismo comportamiento que en diseno.html) -->
    <style>
      .lightbox {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.55);
        z-index: 9999;
        padding: 20px;
      }
      .lightbox.open { display: flex; }

      .lightbox-inner {
        position: relative;
        width: min(900px, 95vw);
        border-radius: 12px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 18px;
        background: transparent;
      }

      .lightbox-bg {
        position: absolute;
        inset: 0;
        background-size: cover;
        background-position: center;
        filter: blur(18px) saturate(105%);
        transform: scale(1.06);
        opacity: 0.95;
        z-index: 1;
      }

      .lightbox-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35));
        z-index: 2;
      }

      .lightbox-caption {
        position: relative;
        z-index: 3;
        color: #fff;
        padding: 20px;
        margin: 0;
        border-radius: 10px;
        text-align: center;
        width: 100%;
        max-width: 920px;
        font-size: clamp(15px, 2.2vw, 20px);
        line-height: 1.45;
        background: rgba(0,0,0,0.28);
        backdrop-filter: blur(3px);
        word-wrap: break-word;
        white-space: pre-wrap;
      }

      .lightbox-image {
        position: relative;
        z-index: 3;
        max-width: 95%;
        max-height: 70vh;
        border-radius: 8px;
        display: none;
        object-fit: contain;
        box-shadow: 0 24px 48px rgba(0,0,0,0.6);
        margin-top: 14px;
      }

      .lightbox-toggle {
        position: relative;
        z-index: 4;
        display: inline-block;
        margin-top: 14px;
        background: rgba(255,255,255,0.06);
        color: #fff;
        border: none;
        padding: 8px 14px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 13px;
      }

      .lightbox-close {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 5;
        background: rgba(255,255,255,0.06);
        color: #fff;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* image-mode: ocultar texto y fondo borroso, mostrar la imagen */
      .lightbox.image-mode .lightbox-bg,
      .lightbox.image-mode .lightbox-overlay,
      .lightbox.image-mode .lightbox-caption {
        display: none !important;
      }

      .lightbox.image-mode .lightbox-image {
        display: block;
      }

      @media (max-width:480px){
        .lightbox-caption { font-size: 14px; padding: 14px; }
        .lightbox-toggle { padding: 6px 10px; font-size: 12px; }
      }
    </style>
  </head>
<!-- Reemplazo: lightbox minimal con toggle (texto / imagen) -->
<div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-label="Descripción de la fotografía">
  <div class="lightbox-inner" role="document">
    <div class="lightbox-bg" aria-hidden="true"></div>
    <div class="lightbox-overlay" aria-hidden="true"></div>

    <div class="lightbox-caption" aria-live="polite"></div>

    <img class="lightbox-image" src="" alt="Vista ampliada">

    <button class="lightbox-toggle" aria-label="Ver imagen">Ver imagen</button>
    <button class="lightbox-close" aria-label="Cerrar visor">&times;</button>
  </div>
</div>

<script>
  // Aplicar misma lógica que en diseno.html: abrir texto primero, toggle para ver imagen completa
  (function(){
    const lightbox = document.getElementById('lightbox');
    const lightboxBg = lightbox.querySelector('.lightbox-bg');
    const caption = lightbox.querySelector('.lightbox-caption');
    const closeBtn = lightbox.querySelector('.lightbox-close');
    const toggleBtn = lightbox.querySelector('.lightbox-toggle');
    const bigImg = lightbox.querySelector('.lightbox-image');

    const imgs = document.querySelectorAll('.gallery-card img');

    imgs.forEach(img=>{
      img.addEventListener('click', e=>{
        e.preventDefault();
        const src = img.src;
        const text = img.dataset.description || img.alt || 'Descripción no disponible';

        lightboxBg.style.backgroundImage = `url('${src}')`;
        bigImg.src = src;
        bigImg.alt = img.alt || '';
        caption.textContent = text;

        // abrir en modo texto por defecto
        lightbox.classList.remove('image-mode');
        toggleBtn.textContent = 'Ver imagen';
        toggleBtn.setAttribute('aria-label','Ver imagen');

        lightbox.classList.add('open');
        lightbox.setAttribute('aria-hidden','false');

        document.documentElement.style.overflow = 'hidden';
        document.body.style.overflow = 'hidden';

        closeBtn.focus();
      });
    });

    // alternar entre texto e imagen
    toggleBtn.addEventListener('click', ()=>{
      const isImageMode = lightbox.classList.toggle('image-mode');
      if (isImageMode) {
        toggleBtn.textContent = 'Ver texto';
        toggleBtn.setAttribute('aria-label','Ver texto');
        bigImg.focus && bigImg.focus();
      } else {
        toggleBtn.textContent = 'Ver imagen';
        toggleBtn.setAttribute('aria-label','Ver imagen');
        closeBtn.focus();
      }
    });

    function closeLB(){
      lightbox.classList.remove('open','image-mode');
      lightbox.setAttribute('aria-hidden','true');
      lightboxBg.style.backgroundImage = '';
      caption.textContent = '';
      bigImg.src = '';
      document.documentElement.style.overflow = '';
      document.body.style.overflow = '';
    }

    closeBtn.addEventListener('click', closeLB);

    lightbox.addEventListener('click', e=>{
      if (e.target === lightbox || e.target.classList.contains('lightbox-overlay')) closeLB();
    });

    document.addEventListener('keydown', e=>{
      if (e.key === 'Escape') closeLB();
    });
  })();
</script>
